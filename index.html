<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Orientation WebApp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <h1>PDF Orientation</h1>

    <div class="container">

        <label>Carica PDF:</label>
        <input type="file" id="pdfInput" accept="application/pdf">

        <label>Pagina iniziale:</label>
        <input type="number" id="startPage" value="1">

        <label>Pagina finale:</label>
        <input type="number" id="endPage" value="9999">

        <button id="processBtn">Correggi Orientamento</button>

        <a id="downloadLink" style="display:none;">Scarica PDF Corretto</a>

    </div>

    <script src="pdf-lib.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
